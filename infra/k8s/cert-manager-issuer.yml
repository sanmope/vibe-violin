# Step 1: Bootstrap ClusterIssuer (self-signed, only used to create the root CA cert)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
spec:
  selfSigned: {}
---
# Step 2: Root CA Certificate (ECDSA P-256, 10 years)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vibe-root-ca
  namespace: vibe
spec:
  isCA: true
  commonName: vibe-root-ca
  secretName: vibe-root-ca-secret
  duration: 87600h # 10 years
  renewBefore: 8760h # 1 year
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-bootstrap
    kind: ClusterIssuer
    group: cert-manager.io
---
# Step 3: CA Issuer that signs all workload certificates
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: vibe-ca-issuer
  namespace: vibe
spec:
  ca:
    secretName: vibe-root-ca-secret
