apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: vibe
data:
  default.conf: |
    upstream frontend {
        least_conn;
        server frontend-svc:443;
    }

    server {
        listen 80;
        server_name _;

        # Gzip compression
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml;
        gzip_min_length 256;

        location / {
            proxy_pass https://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # mTLS: nginx presents client cert to frontend
            proxy_ssl_verify on;
            proxy_ssl_trusted_certificate /etc/nginx/certs/ca.crt;
            proxy_ssl_certificate     /etc/nginx/certs/tls.crt;
            proxy_ssl_certificate_key /etc/nginx/certs/tls.key;
            proxy_ssl_server_name on;
            proxy_ssl_name frontend-svc;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;

            # Cache static assets
            proxy_cache_valid 200 30m;
            proxy_buffering on;
        }

        location /health {
            access_log off;
            return 200 '{"status": "ok"}';
            add_header Content-Type application/json;
        }

        location /api/ {
            return 502 '{"error": "Backend not available yet"}';
            add_header Content-Type application/json;
        }
    }
