services:
  frontend:
    build: ../frontend
    deploy:
      replicas: 2
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vibe
      POSTGRES_PASSWORD: vibe_secret
      POSTGRES_DB: vibe_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
